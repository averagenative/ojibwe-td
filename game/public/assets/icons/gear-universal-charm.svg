<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Universal Charm — Any tower: medicine wheel design -->
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#c4a265" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#c4a265" stroke-width="1.5" opacity="0.5"/>
  <!-- Cross dividers -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#c4a265" stroke-width="2"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#c4a265" stroke-width="2"/>
  <!-- Four directional elements (earth tones) -->
  <!-- North: white/spirit -->
  <circle cx="32" cy="14" r="4" fill="#eeddcc"/>
  <!-- East: yellow/dawn -->
  <circle cx="50" cy="32" r="4" fill="#ddaa44"/>
  <!-- South: red/life -->
  <circle cx="32" cy="50" r="4" fill="#cc6644"/>
  <!-- West: black/night -->
  <circle cx="14" cy="32" r="4" fill="#443322"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="5" fill="#c4a265"/>
  <circle cx="32" cy="32" r="3" fill="#ddc088"/>
  <!-- Subtle glow -->
  <circle cx="32" cy="32" r="26" fill="#c4a265" opacity="0.08"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Crystal Core — Frost gear: faceted hexagonal ice crystal -->
  <!-- Crystal body -->
  <polygon points="32,6 52,18 52,46 32,58 12,46 12,18" fill="#4488bb" opacity="0.85"/>
  <!-- Inner facets -->
  <polygon points="32,12 46,22 46,42 32,52 18,42 18,22" fill="#66aadd" opacity="0.6"/>
  <!-- Central highlight -->
  <polygon points="32,20 40,26 40,38 32,44 24,38 24,26" fill="#88ccff" opacity="0.5"/>
  <!-- Facet lines -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#99ddff" stroke-width="0.8" opacity="0.4"/>
  <line x1="12" y1="18" x2="52" y2="46" stroke="#99ddff" stroke-width="0.8" opacity="0.4"/>
  <line x1="52" y1="18" x2="12" y2="46" stroke="#99ddff" stroke-width="0.8" opacity="0.4"/>
  <!-- Sparkle at top -->
  <circle cx="32" cy="10" r="2" fill="#ffffff" opacity="0.7"/>
  <!-- Small sparkles -->
  <circle cx="22" cy="20" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="42" cy="40" r="1.2" fill="#ffffff" opacity="0.5"/>
</svg>

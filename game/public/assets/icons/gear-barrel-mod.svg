<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Barrel Mod — Rock Hurler gear: horizontal barrel with metal bands -->
  <!-- Barrel body -->
  <rect x="10" y="20" width="44" height="24" rx="6" fill="#886644"/>
  <rect x="10" y="22" width="44" height="10" rx="3" fill="#997755" opacity="0.5"/>
  <!-- Metal bands -->
  <rect x="18" y="18" width="4" height="28" rx="1" fill="#555555"/>
  <rect x="34" y="18" width="4" height="28" rx="1" fill="#555555"/>
  <!-- Band highlights -->
  <rect x="19" y="19" width="2" height="12" rx="1" fill="#777777" opacity="0.6"/>
  <rect x="35" y="19" width="2" height="12" rx="1" fill="#777777" opacity="0.6"/>
  <!-- Muzzle opening -->
  <ellipse cx="54" cy="32" rx="4" ry="8" fill="#553322"/>
  <ellipse cx="54" cy="32" rx="2" ry="5" fill="#332211"/>
  <!-- Breach end -->
  <circle cx="10" cy="32" r="3" fill="#665533"/>
  <!-- Grip notch -->
  <rect x="24" y="44" width="14" height="4" rx="2" fill="#775533"/>
</svg>

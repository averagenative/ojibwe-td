<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ojibwe TD</title>
    <link rel="icon" type="image/svg+xml" href="/assets/ui/medicine-wheel.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header id="game-header">
      <img src="/assets/ui/logo.png" alt="Ojibwe TD" id="logo" />
    </header>
    <div id="game-container"></div>

    <!-- Portrait-mode overlay — only visible on mobile + portrait via CSS -->
    <div id="rotate-prompt" aria-live="polite" role="alert">
      <div class="rotate-content">
        <div class="rotate-icon">⟳</div>
        <p class="rotate-text">Rotate your device to play</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
